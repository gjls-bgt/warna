<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Warna Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; touch-action: none; user-select: none; margin: 0; padding: 0; }
        .bg-pattern {
            background-color: #f0f9ff;
            background-image: url(Assets/bg.png);
            background-size: cover;
        }
        
        .btn-fancy {
            transition: all 0.2s;
            box-shadow: 0 4px 0 0 #d97706;
        }
        .btn-fancy:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 #d97706;
        }

        /* --- MENU SLIDER KATEGORI & GALLERY (Horizontal Scroll) --- */
        .category-slider, .gallery-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            max-width: 720px;
            padding: 10px 20px 20px 20px;
            gap: 12px;
        }
        .category-slider::-webkit-scrollbar, .gallery-slider::-webkit-scrollbar {
            display: none;
        }
        
        .category-item, .gallery-item {
            flex: 0 0 calc(25% - 8px);
            height: 100px;
            scroll-snap-align: start;
        }

        /* --- DESAIN KHUSUS GAME LANDSCAPE MOBILE (Full Viewport) --- */
        .game-viewport {
            width: 100vw;
            height: 100vh;
            background: white;
            border: none;
            position: relative;
            overflow: hidden;
            box-shadow: none;
        }

        #canvasFrame {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            position: relative;
        }

        canvas {
            image-rendering: pixelated;
            cursor: crosshair;
            transform-origin: center center;
            position: absolute;
        }

        /* Palet Spidol Mengambang Bisa Scroll Vertikal */
        .marker-palette-container {
            position: absolute;
            left: 0;
            top: 10px;
            bottom: 20px;
            width: 110px;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 20;
            padding-right: 10px;
            scrollbar-width: none;
        }
        .marker-palette-container::-webkit-scrollbar {
            display: none;
        }

        .marker-palette {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0;
        }

        /* Desain Pensil Warna Realistis */
        .marker {
            width: 75px;
            height: 34px;
            border-radius: 0 6px 6px 0; 
            cursor: pointer;
            transition: transform 0.2s, width 0.2s;
            border: 1px solid rgba(0,0,0,0.25);
            border-left: none;
            position: relative;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            transform: translateX(-20px); 
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 30%, rgba(0,0,0,0.05) 70%, rgba(0,0,0,0.25) 100%);
        }

        .marker::before {
            content: '';
            position: absolute;
            right: -14px; top: -1px;
            width: 14px; height: 34px;
            background: #eccca1; 
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .marker::after {
            content: '';
            position: absolute;
            right: -14px; top: 11px;
            width: 6px; height: 12px;
            background: inherit; 
            background-color: var(--marker-color);
            clip-path: polygon(0 20%, 100% 50%, 0 80%);
        }

        .marker:hover, .marker.active {
            transform: translateX(0px); 
            width: 88px;
        }
        
        .marker.active {
            box-shadow: 4px 4px 10px rgba(0,0,0,0.35);
        }

        /* Tombol Utilitas Mengambang (Sisi Kanan) - Diperbanyak untuk Zoom & Fit */
        .utility-palette {
            position: absolute;
            right: 16px;
            top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
        }

        .btn-game {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .btn-game:active { transform: scale(0.9); }
        .btn-home { background: #3b82f6; color: white; }
        .btn-undo { background: #6b7280; color: white; }
        .btn-reset { background: #f97316; color: white; }
        .btn-save { background: #22c55e; color: white; }
        
        /* Tombol Fit & Zoom Baru */
        .btn-zoom-in { background: #ec4899; color: white; }
        .btn-zoom-out { background: #a855f7; color: white; }
        .btn-fit { background: #14b8a6; color: white; }

        .status-overlay {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center">

    <div id="pageHome" class="flex flex-col items-center p-6 w-full overflow-hidden">
        <p class="text-gray-600 mb-2 font-bold flex items-center gap-2" style="margin-top: 160px; font-size: 1.5rem;">
            PILIH KATEGORI <i class="fas fa-angles-right text-sm animate-pulse text-gray-400"></i>
        </p>
        
        <div class="category-slider">
            <div class="category-item">
                <button onclick="showGallery('binatang')" class="w-full bg-yellow-400 p-6 rounded-3xl btn-fancy text-white text-center">
                    <i class="fas fa-paw text-4xl mb-2"></i><br>BINATANG
                </button>
            </div>
            <div class="category-item">
                <button onclick="showGallery('kendaraan')" class="w-full bg-blue-400 p-6 rounded-3xl btn-fancy text-white text-center">
                    <i class="fas fa-car text-4xl mb-2"></i><br>KENDARAAN
                </button>
            </div>
            <div class="category-item">
                <button onclick="showGallery('buah')" class="w-full bg-green-400 p-6 rounded-3xl btn-fancy text-white text-center">
                    <i class="fas fa-apple-whole text-4xl mb-2"></i><br>BUAH
                </button>
            </div>
            <div class="category-item">
                <button onclick="showGallery('fantasi')" class="w-full bg-purple-400 p-6 rounded-3xl btn-fancy text-white text-center">
                    <i class="fas fa-wand-magic-sparkles text-4xl mb-2"></i><br>FANTASI
                </button>
            </div>
        </div>
    </div>

    <div id="pageGallery" class="hidden flex flex-col items-center p-6 w-full overflow-hidden">
        <div class="flex items-center justify-content-center max-w-md mb-2" style="margin-top: 160px;">
            <button onclick="goHome()" class="bg-white/80 backdrop-blur-sm p-3 rounded-full mr-4 shadow-sm text-gray-700"><i class="fas fa-arrow-left"></i></button>
            <h2 id="galleryTitle" class="text-2xl font-bold text-gray-800 uppercase drop-shadow-sm">Pilih Gambar</h2>
        </div>
        
        <div id="imageList" class="gallery-slider"></div>
    </div>

    <div id="pageEditor" class="hidden w-full h-full m-0 p-0">
        <div class="game-viewport">
            
            <div class="marker-palette-container">
                <div class="marker-palette" id="palette"></div>
            </div>

            <div class="utility-palette">
                <button onclick="backToGallery()" class="btn-game btn-home" title="Kembali ke Galeri"><i class="fas fa-home"></i></button>
                <button onclick="undo()" class="btn-game btn-undo" title="Undo"><i class="fas fa-rotate-left"></i></button>
                <button onclick="resetCanvas()" class="btn-game btn-reset" title="Reset Gambar"><i class="fas fa-trash"></i></button>
                
                <button onclick="zoomIn()" class="btn-game btn-zoom-in" title="Perbesar"><i class="fas fa-magnifying-glass-plus"></i></button>
                <button onclick="zoomOut()" class="btn-game btn-zoom-out" title="Perkecil"><i class="fas fa-magnifying-glass-minus"></i></button>
                <button onclick="zoomFit()" class="btn-game btn-fit" title="Pas Layar"><i class="fas fa-expand"></i></button>
                
                <button onclick="saveImage()" class="btn-game btn-save" title="Simpan Gambar"><i class="fas fa-download"></i></button>
            </div>

            <div id="canvasFrame">
                <canvas id="paintCanvas"></canvas>
            </div>

        </div>
    </div>

    <script>
        const library = {
            binatang: [
                "Assets/Binatang/anjing.png",
                "Assets/Binatang/ayam.png",
                "Assets/Binatang/bebek.png",
                "Assets/Binatang/burung.png",
                "Assets/Binatang/gajah.png",
                "Assets/Binatang/harimau.png",
                "Assets/Binatang/ikan.png",
                "Assets/Binatang/itik.png",
                "Assets/Binatang/kelinci.png",
                "Assets/Binatang/kucing.png",
                "Assets/Binatang/kupu-kupu.jpg",
                "Assets/Binatang/monyet.png",
                "Assets/Binatang/sapi.png",
                "Assets/Binatang/singa.png",
            ],
            kendaraan: [
                "Assets/Kendaraan/helikopter.png",
                "Assets/Kendaraan/kapallaut.png",
                "Assets/Kendaraan/keretaapi.png",
                "Assets/Kendaraan/mobil.png",
                "Assets/Kendaraan/motor.png",
                "Assets/Kendaraan/pesawat.png",
                "Assets/Kendaraan/sepeda.png",
            ],
            buah: [
                "Assets/Buah/apple.png", 
                "Assets/Buah/orange.png", 
                "Assets/Buah/banana.jpg"
            ],
            profesi: [
                "Assets/Profesi/dokter.png", 
                "Assets/Profesi/guru.png",
                "Assets/Profesi/petani.png",
                "Assets/Profesi/pilot.png",
            ]
        };

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let selectedColor = '#FF3B30'; // Default merah terang anak-anak
        let undoStack = [];
        let currentCategory = '';
        let currentImgUrl = '';

        // Variabel Transformasi Kanvas
        let scale = 1;
        let baseScale = 1;
        let panX = 0;
        let panY = 0;
        let startPanX = 0;
        let startPanY = 0;
        let isDragging = false;
        let evCache = [];
        let prevDiff = -1;

        let originalOutlineCanvas = null;
        let texturePatternCanvas = null; // Canvas bantuan pola krayon

        // Palet warna cerah populer yang paling sering digunakan anak-anak
// Palet warna yang lengkap dan bervariasi untuk anak-anak
        const colors = [
            // --- WARNA UTAMA & GARIS ---
            '#000000', // Hitam
            '#FFFFFF', // Putih
            '#8E8E93', // Kelabu Abu
            '#AEAEB2', // Kelabu Cerah

            // --- MERAH & MERAH JAMBU (POPULER) ---
            '#FF0000', // Merah Terang
            '#FF2D55', // Merah Stroberi
            '#E60067', // Magenta / Fuksia
            '#FF6B8B', // Merah Jambu Sederhana
            '#FFB3BA', // Pink Pastel

            // --- JINGGA & KUNING ---
            '#FF9500', // Jingga / Oren
            '#FFA726', // Oren Oren Lemon
            '#FFCC00', // Kuning Pisang
            '#FFE082', // Kuning Jagung Cerah
            '#FFFFBA', // Kuning Pastel

            // --- HIJAU (ALAM & DAUN) ---
            '#4CD964', // Hijau Epal
            '#2E7D32', // Hijau Daun Tua
            '#81C784', // Hijau Rumput Sederhana
            '#A5D6A7', // Hijau Lumut Muda
            '#BAFFC9', // Hijau Pastel Mint

            // --- BIRU (LANGIT & LAUT) ---
            '#007AFF', // Biru Diraja (Royal Blue)
            '#5AC8FA', // Biru Sian / Langit Cerah
            '#1E88E5', // Biru Samudra
            '#90CAF9', // Biru Air Muda
            '#BAE1FF', // Biru Pastel

            // --- UNGU & FANTASI ---
            '#5856D6', // Ungu Indigo
            '#AF52DE', // Ungu Terang
            '#CE93D8', // Ungu Lavender Muda
            '#E1BEE7', // Ungu Pastel Orchid

            // --- TON KULIT, KAYU & TANAH ---
            '#FFDFBA', // Kulit Cerah / Pastel Peach
            '#E8C48F', // Kulit Langsat / Krim Tat
            '#CD853F', // Cokelat Muda / Karamel
            '#965A38', // Cokelat Kayu / Pagar
            '#4A2E1B', // Cokelat Tanah Tua

            // --- WARNA ALAM TAMBAHAN ---
            '#224D17', // Hijau Hutan Gelap
            '#122640', // Biru Malam Pekat (Midnight Blue)
            '#631627', // Merah Manggis Tua (Maroon)
            '#008080'  // Hijau Toska / Teal
        ];
        // --- UPDATE: Fungsi membuat tekstur goresan krayon secara dinamis ---
        function createCrayonTexture(hexColor) {
            const texCanvas = document.createElement('canvas');
            // Ukuran tile krayon kecil agar goresan terlihat padat
            texCanvas.width = 64; 
            texCanvas.height = 64;
            const tCtx = texCanvas.getContext('2d');
            
            // Berikan warna dasar transparan agak pudar (tidak memblokir total)
            tCtx.fillStyle = hexColor;
            tCtx.globalAlpha = 0.82; 
            tCtx.fillRect(0, 0, 64, 64);
            
            // Tambahkan goresan-goresan serat pensil/krayon acak
            const rgb = hexToRgb(hexColor);
            for (let i = 0; i < 450; i++) {
                const x = Math.random() * 64;
                const y = Math.random() * 64;
                const radius = 0.4 + Math.random() * 0.8;
                
                // Variasi gelap terang butiran krayon
                const isDark = Math.random() > 0.5;
                const offset = Math.floor(Math.random() * 25);
                const r = isDark ? Math.max(0, rgb.r - offset) : Math.min(255, rgb.r + offset);
                const g = isDark ? Math.max(0, rgb.g - offset) : Math.min(255, rgb.g + offset);
                const b = isDark ? Math.max(0, rgb.b - offset) : Math.min(255, rgb.b + offset);
                
                tCtx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                tCtx.globalAlpha = 0.15 + Math.random() * 0.35;
                tCtx.beginPath();
                tCtx.arc(x, y, radius, 0, Math.PI * 2);
                tCtx.fill();
            }
            return texCanvas;
        }

        // 1. NAVIGASI
        function showGallery(cat) {
            currentCategory = cat;
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageGallery').classList.remove('hidden');
            document.getElementById('galleryTitle').innerText = "Koleksi " + cat;
            
            const list = document.getElementById('imageList');
            list.innerHTML = '';
            if(library[cat]) {
                library[cat].forEach(url => {
                    const itemWrapper = document.createElement('div');
                    itemWrapper.className = "gallery-item";
                    
                    const item = document.createElement('div');
                    item.className = "bg-white p-4 rounded-3xl shadow-md border-4 border-transparent hover:border-blue-400 cursor-pointer transition flex items-center justify-center h-full";
                    item.innerHTML = `<img src="${url}" class="w-full max-h-full object-contain" onerror="this.src='https://placehold.co/150?text=Gambar+Lokal'">`;
                    item.onclick = () => startColoring(url);
                    
                    itemWrapper.appendChild(item);
                    list.appendChild(itemWrapper);
                });
            }
            list.scrollLeft = 0;
        }

        function goHome() {
            document.getElementById('pageGallery').classList.add('hidden');
            document.getElementById('pageHome').classList.remove('hidden');
        }

        function backToGallery() {
            document.getElementById('pageEditor').classList.add('hidden');
            document.getElementById('pageGallery').classList.remove('hidden');
        }

        // 2. LOGIKA EDITOR & DOCKING CANVAS
        let imgWidth = 0, imgHeight = 0;

        function startColoring(url) {
            currentImgUrl = url;
            document.getElementById('pageGallery').classList.add('hidden');
            document.getElementById('pageEditor').classList.remove('hidden');
            
            const img = new Image();
            img.src = url;
            img.onload = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const ratio = Math.min((canvas.width - 160) / img.width, (canvas.height - 40) / img.height);
                imgWidth = img.width * ratio;
                imgHeight = img.height * ratio;
                ctx.drawImage(img, (canvas.width - imgWidth) / 2, (canvas.height - imgHeight) / 2, imgWidth, imgHeight);
                
                originalOutlineCanvas = document.createElement('canvas');
                originalOutlineCanvas.width = canvas.width;
                originalOutlineCanvas.height = canvas.height;
                const oCtx = originalOutlineCanvas.getContext('2d');
                oCtx.drawImage(canvas, 0, 0);

                undoStack = [];
                saveState(); 

                zoomFit(); // Set default tampilan langsung pas layar
            };
            img.onerror = () => {
                // Skenario aman jika gambar lokal di aset belum diletakkan fisik
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                ctx.fillStyle = "white";
                ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "#333";
                ctx.font = "20px Quicksand";
                ctx.fillText("Silakan simpan berkas gambar di folder Assets kamu!", 50, canvas.height/2);
                originalOutlineCanvas = document.createElement('canvas');
                originalOutlineCanvas.width = canvas.width;
                originalOutlineCanvas.height = canvas.height;
                originalOutlineCanvas.getContext('2d').drawImage(canvas, 0, 0);
                zoomFit();
            };
        }

        function applyTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        // --- UPDATE: Fungsi Pengontrol Zoom & Fit Screen Terarah ---
        function zoomIn() {
            scale = Math.min(scale + 0.25, 4.0);
            applyTransform();
        }

        function zoomOut() {
            scale = Math.max(scale - 0.25, 0.6);
            applyTransform();
        }

        function zoomFit() {
            scale = 1;
            panX = 0;
            panY = 0;
            applyTransform();
        }

        // 3. POINTER EVENT TRACKING
        const frame = document.getElementById('canvasFrame');

        frame.addEventListener('pointerdown', (e) => {
            evCache.push(e);
            if (evCache.length === 1) {
                isDragging = false;
            } else if (evCache.length === 2) {
                isDragging = true;
                const p1 = evCache[0];
                const p2 = evCache[1];
                startPanX = ((p1.clientX + p2.clientX) / 2) - panX;
                startPanY = ((p1.clientY + p2.clientY) / 2) - panY;
                prevDiff = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                baseScale = scale;
            }
        });

        frame.addEventListener('pointermove', (e) => {
            const index = evCache.findIndex((ev) => ev.pointerId === e.pointerId);
            if (index > -1) evCache[index] = e;

            if (evCache.length === 2) {
                isDragging = true;
                const p1 = evCache[0];
                const p2 = evCache[1];

                const currentMidX = (p1.clientX + p2.clientX) / 2;
                const currentMidY = (p1.clientY + p2.clientY) / 2;
                panX = currentMidX - startPanX;
                panY = currentMidY - startPanY;

                const curDiff = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                if (prevDiff > 0) {
                    const pinScale = curDiff / prevDiff;
                    scale = Math.min(Math.max(baseScale * pinScale, 0.6), 4.0);
                }
                applyTransform();
            }
        });

        const handlePointerUp = (e) => {
            const index = evCache.findIndex((ev) => ev.pointerId === e.pointerId);
            if (index > -1) evCache.splice(index, 1);
            if (evCache.length < 2) prevDiff = -1;
        };

        frame.addEventListener('pointerup', handlePointerUp);
        frame.addEventListener('pointercancel', handlePointerUp);
        frame.addEventListener('pointerleave', handlePointerUp);

        // 4. MEWARNAI DENGAN PATTERN KRAYON / PENSIL WARNA
        canvas.addEventListener('click', (e) => {
            if (isDragging) return;

            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

            floodFillPattern(x, y, selectedColor);
            saveState();
        });

        function floodFillPattern(startX, startY, colorHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const oCtx = originalOutlineCanvas.getContext('2d');
            const originalData = oCtx.getImageData(0, 0, canvas.width, canvas.height);

            const targetColor = getPixelColor(imageData, startX, startY);
            
            // Validasi deteksi: jika mengklik struktur garis hitam asli, langsung batalkan
            const originalColorAtStart = getPixelColor(originalData, startX, startY);
            if (originalColorAtStart.r < 65 && originalColorAtStart.g < 65 && originalColorAtStart.b < 65) {
                return; 
            }

            // Membuat pola krayon khusus berdasarkan warna spidol yang sedang aktif
            texturePatternCanvas = createCrayonTexture(colorHex);
            const tCtx = texturePatternCanvas.getContext('2d');
            const patternData = tCtx.getImageData(0, 0, 64, 64);

            const pixelsToCheck = [startX, startY];
            const filledPixels = [];

            // Objek bantuan tanda periksa koordinat agar memori efisien
            const visited = new Uint8Array(canvas.width * canvas.height);

            // --- Langkah 1: Pengumpulan area Floodfill secara spasial ---
            while (pixelsToCheck.length > 0) {
                const y = pixelsToCheck.pop();
                const x = pixelsToCheck.pop();

                if (x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) continue;

                const idx = y * canvas.width + x;
                if (visited[idx]) continue;

                const currentColor = getPixelColor(imageData, x, y);
                const origColor = getPixelColor(originalData, x, y);

                if (colorsMatch(currentColor, targetColor) && !(origColor.r < 65 && origColor.g < 65 && origColor.b < 65)) {
                    visited[idx] = 1;
                    filledPixels.push({x, y});

                    pixelsToCheck.push(x + 1, y, x - 1, y, x, y + 1, x, y - 1);
                }
            }

            // --- Langkah 2: Proses Penulisan Tekstur Krayon ke Koordinat Area ---
            filledPixels.forEach(p => {
                // Petakan koordinat kanvas global ke koordinat ubin krayon (64x64) secara berulang (tiling)
                const tx = ((p.x % 64) + 64) % 64;
                const ty = ((p.y % 64) + 64) % 64;
                const pIdx = (ty * 64 + tx) * 4;

                const fillRgb = {
                    r: patternData.data[pIdx],
                    g: patternData.data[pIdx+1],
                    b: patternData.data[pIdx+2]
                };

                setPixelColor(imageData, p.x, p.y, fillRgb);
            });

            // --- Langkah 3: Ekspansi Radius Halus Tepi Garis (Dilation) ---
            const expandPx = 0.0;
            for (let step = 0; step < expandPx; step++) {
                const currentLength = filledPixels.length;
                for (let i = 0; i < currentLength; i++) {
                    const p = filledPixels[i];
                    const neighbors = [{x:p.x+1, y:p.y}, {x:p.x-1, y:p.y}, {x:p.x, y:p.y+1}, {x:p.x, y:p.y-1}];

                    neighbors.forEach(n => {
                        if (n.x >= 0 && n.y >= 0 && n.x < canvas.width && n.y < canvas.height) {
                            const nIdx = n.y * canvas.width + n.x;
                            if (!visited[nIdx]) {
                                const nOrigColor = getPixelColor(originalData, n.x, n.y);
                                if (!(nOrigColor.r < 50 && nOrigColor.g < 50 && nOrigColor.b < 50)) {
                                    const tx = ((n.x % 64) + 64) % 64;
                                    const ty = ((n.y % 64) + 64) % 64;
                                    const pIdx = (ty * 64 + tx) * 4;

                                    setPixelColor(imageData, n.x, n.y, {
                                        r: patternData.data[pIdx],
                                        g: patternData.data[pIdx+1],
                                        b: patternData.data[pIdx+2]
                                    });
                                }
                            }
                        }
                    });
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function getPixelColor(imgData, x, y) {
            if (x < 0 || y < 0 || x >= imgData.width || y >= imgData.height) return {r:-1,g:-1,b:-1,a:-1};
            const i = (y * imgData.width + x) * 4;
            return { r: imgData.data[i], g: imgData.data[i+1], b: imgData.data[i+2], a: imgData.data[i+3] };
        }

        function setPixelColor(imgData, x, y, color) {
            const i = (y * imgData.width + x) * 4;
            imgData.data[i] = color.r;
            imgData.data[i+1] = color.g;
            imgData.data[i+2] = color.b;
            imgData.data[i+3] = 255;
        }

        // Ditambah sedikit toleransinya agar penimpaan antar butir krayon yang berbeda intensitas tetap mulus
        function colorsMatch(c1, c2) {
            return Math.abs(c1.r - c2.r) < 60 && Math.abs(c1.g - c2.g) < 60 && Math.abs(c1.b - c2.b) < 60;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        // 5. UNDO, RESET, & SIMPAN
        function saveState() {
            if (undoStack.length >= 10) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if (undoStack.length > 1) {
                undoStack.pop();
                ctx.putImageData(undoStack[undoStack.length - 1], 0, 0);
            }
        }

        function resetCanvas() {
            startColoring(currentImgUrl);
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'hasil-krayon-anak.png';
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 6. INISIALISASI PALET WARNA POPULER
        const paletteEl = document.getElementById('palette');
        colors.forEach((c, idx) => {
            const btn = document.createElement('div');
            btn.className = "marker" + (idx === 0 ? " active" : "");
            btn.style.backgroundColor = c;
            btn.style.setProperty('--marker-color', c); 
            btn.onclick = () => {
                selectedColor = c;
                highlightPalette(btn);
            };
            paletteEl.appendChild(btn);
        });

        function highlightPalette(activeBtn) {
            document.querySelectorAll('#palette .marker').forEach(b => b.classList.remove('active'));
            if(activeBtn) activeBtn.classList.add('active');
        }
    </script>
</body>
