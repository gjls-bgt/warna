<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Warna Anak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            margin: 0; 
            padding: 0; 
            background: #0f172a; /* Background gelap di luar area 16:9 jika layar terlalu kotak/tinggi */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- WRAPPER UTAMA RASIO PROPORSONAL 16:9 (LANDSCAPE) --- */
        .app-container {
            width: 100vw;
            height: 100vh;
            max-width: 177.78vh; /* 100 * 16 / 9 = 177.78 */
            max-height: 56.25vw; /* 100 * 9 / 16 = 56.25 */
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            background-color: #f0f9ff;
            background-image: url(Assets/bg.png);
            background-size: cover;
            background-position: center;
        }
        
        .btn-fancy {
            transition: all 0.2s;
            box-shadow: 0 4px 0 0 #d97706;
        }
        .btn-fancy:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 0 #d97706;
        }

        /* --- MENU SLIDER KATEGORI & GALLERY (Horizontal Scroll) --- */
        .category-slider, .gallery-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            width: 100%;
            padding: 10px 20px 20px 20px;
            gap: 16px;
            scrollbar-width: none;
        }
        .category-slider::-webkit-scrollbar, .gallery-slider::-webkit-scrollbar {
            display: none;
        }
        
        .category-item, .gallery-item {
            flex: 0 0 calc(25% - 12px);
            height: 140px;
            scroll-snap-align: start;
        }

        /* --- DESAIN EDITOR SESUAI RASIO 16:9 LANDSCAPE --- */
        .game-viewport {
            width: 100%;
            height: 100%;
            background: white;
            position: relative;
            overflow: hidden;
        }

        #canvasFrame {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            position: relative;
        }

        canvas {
            image-rendering: pixelated;
            cursor: crosshair;
            transform-origin: center center;
            position: absolute;
        }

        /* Palet Spidol Mengambang Kiri (Scroll Vertikal) */
        .marker-palette-container {
            position: absolute;
            left: 0;
            top: 10px;
            bottom: 10px;
            width: 110px;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 20;
            padding-right: 10px;
            scrollbar-width: none;
        }
        .marker-palette-container::-webkit-scrollbar {
            display: none;
        }

        .marker-palette {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0;
        }

        /* Desain Pensil Warna Menghadap Kanan (Asli) */
        .marker {
            width: 75px;
            height: 34px;
            border-radius: 0 6px 6px 0; 
            cursor: pointer;
            transition: transform 0.2s, width 0.2s;
            border: 1px solid rgba(0,0,0,0.25);
            border-left: none;
            position: relative;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            transform: translateX(-20px); 
            background-image: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 30%, rgba(0,0,0,0.05) 70%, rgba(0,0,0,0.25) 100%);
        }

        .marker::before {
            content: '';
            position: absolute;
            right: -14px; top: -1px;
            width: 14px; height: 34px;
            background: #eccca1; 
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .marker::after {
            content: '';
            position: absolute;
            right: -14px; top: 11px;
            width: 6px; height: 12px;
            background: inherit; 
            background-color: var(--marker-color);
            clip-path: polygon(0 20%, 100% 50%, 0 80%);
        }

        .marker:hover, .marker.active {
            transform: translateX(0px); 
            width: 88px;
        }
        
        .marker.active {
            box-shadow: 4px 4px 10px rgba(0,0,0,0.35);
        }

        /* Tombol Utilitas Mengambang Sisi Kanan */
        .utility-palette {
            position: absolute;
            right: 16px;
            top: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
        }

        .btn-game {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .btn-game:active { transform: scale(0.9); }
        .btn-home { background: #3b82f6; color: white; }
        .btn-undo { background: #6b7280; color: white; }
        .btn-reset { background: #f97316; color: white; }
        .btn-save { background: #22c55e; color: white; }
        .btn-zoom-in { background: #ec4899; color: white; }
        .btn-zoom-out { background: #a855f7; color: white; }
        .btn-fit { background: #14b8a6; color: white; }
    </style>
</head>
<body>

    <!-- CONTAINER UTAMA 16:9 LANDSCAPE -->
    <div class="app-container">

        <!-- SCREEN 1: HOME -->
        <div id="pageHome" class="flex flex-col items-center justify-center h-full w-full p-6">
            <div style="height: 180px;"></div>
            <p class="text-gray-600 mb-2 font-bold flex items-center gap-2 text-lg">
                PILIH KATEGORI <i class="fas fa-angles-right text-sm animate-pulse text-gray-400"></i>
            </p>
            
            <div class="category-slider">
                <div class="category-item">
                    <button onclick="showGallery('binatang')" class="w-full h-full bg-yellow-400 p-4 rounded-3xl btn-fancy text-white text-center flex flex-col items-center justify-center">
                        <i class="fas fa-paw text-3xl mb-1"></i><span class="font-bold text-sm">BINATANG</span>
                    </button>
                </div>
                <div class="category-item">
                    <button onclick="showGallery('kendaraan')" class="w-full h-full bg-blue-400 p-4 rounded-3xl btn-fancy text-white text-center flex flex-col items-center justify-center">
                        <i class="fas fa-car text-3xl mb-1"></i><span class="font-bold text-sm">KENDARAAN</span>
                    </button>
                </div>
                <div class="category-item">
                    <button onclick="showGallery('buah')" class="w-full h-full bg-green-400 p-4 rounded-3xl btn-fancy text-white text-center flex flex-col items-center justify-center">
                        <i class="fas fa-apple-whole text-3xl mb-1"></i><span class="font-bold text-sm">BUAH</span>
                    </button>
                </div>
                <div class="category-item">
                    <button onclick="showGallery('fantasi')" class="w-full h-full bg-purple-400 p-4 rounded-3xl btn-fancy text-white text-center flex flex-col items-center justify-center">
                        <i class="fas fa-wand-magic-sparkles text-3xl mb-1"></i><span class="font-bold text-sm">FANTASI</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- SCREEN 2: GALLERY -->
        <div id="pageGallery" class="hidden flex flex-col justify-center h-full w-full p-6">
            <div style="height: 200px;"></div>
            <div class="flex items-center mb-4 max-w-md">
                <button onclick="goHome()" class="bg-white/90 p-3 rounded-full mr-4 shadow-sm text-gray-700"><i class="fas fa-arrow-left"></i></button>
                <h2 id="galleryTitle" class="text-2xl font-bold text-gray-800 uppercase drop-shadow-sm">Pilih Gambar</h2>
            </div>
            
            <div id="imageList" class="gallery-slider"></div>
        </div>

        <!-- SCREEN 3: EDITOR CANVAS -->
        <div id="pageEditor" class="hidden w-full h-full m-0 p-0">
            <div class="game-viewport">
                
                <!-- Palet Spidol Mengambang Kiri -->
                <div class="marker-palette-container">
                    <div class="marker-palette" id="palette"></div>
                </div>

                <!-- Tombol Kontrol Kanan -->
                <div class="utility-palette">
                    <button onclick="backToGallery()" class="btn-game btn-home" title="Kembali ke Galeri"><i class="fas fa-home"></i></button>
                    <button onclick="undo()" class="btn-game btn-undo" title="Undo"><i class="fas fa-rotate-left"></i></button>
                    <button onclick="resetCanvas()" class="btn-game btn-reset" title="Reset Gambar"><i class="fas fa-trash"></i></button>
                    
                    <button onclick="zoomIn()" class="btn-game btn-zoom-in" title="Perbesar"><i class="fas fa-magnifying-glass-plus"></i></button>
                    <button onclick="zoomOut()" class="btn-game btn-zoom-out" title="Perkecil"><i class="fas fa-magnifying-glass-minus"></i></button>
                    <button onclick="zoomFit()" class="btn-game btn-fit" title="Pas Layar"><i class="fas fa-expand"></i></button>
                    
                    <button onclick="saveImage()" class="btn-game btn-save" title="Simpan Gambar"><i class="fas fa-download"></i></button>
                </div>

                <!-- Area Canvas Utama -->
                <div id="canvasFrame">
                    <canvas id="paintCanvas"></canvas>
                </div>

            </div>
        </div>

    </div>

    <script>
        // --- SECURE SYSTEM: BLOKIR KLIK KANAN, SELECT, COPY ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'a') {
                    e.preventDefault();
                }
            }
            if (e.key === 'F12') e.preventDefault();
        });

        const library = {
            binatang: [
                "Assets/Binatang/anjing.png", "Assets/Binatang/ayam.png", "Assets/Binatang/burung.png",
                "Assets/Binatang/gajah.png", "Assets/Binatang/ikan.png", "Assets/Binatang/itik.png",
                "Assets/Binatang/kelinci.png", "Assets/Binatang/kucing.png", "Assets/Binatang/kupu-kupu.jpg",
                "Assets/Binatang/monyet.png", "Assets/Binatang/sapi.png", "Assets/Binatang/singa.png"
            ],
            kendaraan: [
                "Assets/Kendaraan/helikopter.png", "Assets/Kendaraan/kapallaut.png", "Assets/Kendaraan/keretaapi.png",
                "Assets/Kendaraan/mobil.png", "Assets/Kendaraan/motor.png", "Assets/Kendaraan/pesawat.png",
                "Assets/Kendaraan/sepeda.png"
            ],
            buah: ["Assets/Buah/apple.png", "Assets/Buah/orange.png", "Assets/Buah/banana.jpg"],
            fantasi: ["Assets/Fantasi/merak.jpg", "Assets/Fantasi/unicorn.png"]
        };

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let selectedColor = '#FF3B30';
        let undoStack = [];
        let currentCategory = '';
        let currentImgUrl = '';

        let scale = 1;
        let baseScale = 1;
        let panX = 0; let panY = 0;
        let startPanX = 0; let startPanY = 0;
        let isDragging = false;
        let evCache = [];
        let prevDiff = -1;

        let originalOutlineCanvas = null;
        let texturePatternCanvas = null;

        const colors = [
            '#000000', '#FFFFFF', '#8E8E93', '#AEAEB2',
            '#FF0000', '#FF2D55', '#E60067', '#FF6B8B', '#FFB3BA',
            '#FF9500', '#FFA726', '#FFCC00', '#FFE082', '#FFFFBA',
            '#4CD964', '#2E7D32', '#81C784', '#A5D6A7', '#BAFFC9',
            '#007AFF', '#5AC8FA', '#1E88E5', '#90CAF9', '#BAE1FF',
            '#5856D6', '#AF52DE', '#CE93D8', '#E1BEE7',
            '#FFDFBA', '#E8C48F', '#CD853F', '#965A38', '#4A2E1B',
            '#224D17', '#122640', '#631627', '#008080'
        ];

        function createCrayonTexture(hexColor) {
            const texCanvas = document.createElement('canvas');
            texCanvas.width = 64; texCanvas.height = 64;
            const tCtx = texCanvas.getContext('2d');
            
            tCtx.fillStyle = hexColor;
            tCtx.globalAlpha = 0.82; 
            tCtx.fillRect(0, 0, 64, 64);
            
            const rgb = hexToRgb(hexColor);
            for (let i = 0; i < 450; i++) {
                const x = Math.random() * 64;
                const y = Math.random() * 64;
                const radius = 0.4 + Math.random() * 0.8;
                
                const isDark = Math.random() > 0.5;
                const offset = Math.floor(Math.random() * 25);
                const r = isDark ? Math.max(0, rgb.r - offset) : Math.min(255, rgb.r + offset);
                const g = isDark ? Math.max(0, rgb.g - offset) : Math.min(255, rgb.g + offset);
                const b = isDark ? Math.max(0, rgb.b - offset) : Math.min(255, rgb.b + offset);
                
                tCtx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                tCtx.globalAlpha = 0.15 + Math.random() * 0.35;
                tCtx.beginPath();
                tCtx.arc(x, y, radius, 0, Math.PI * 2);
                tCtx.fill();
            }
            return texCanvas;
        }

        function showGallery(cat) {
            currentCategory = cat;
            document.getElementById('pageHome').classList.add('hidden');
            document.getElementById('pageGallery').classList.remove('hidden');
            document.getElementById('galleryTitle').innerText = "Koleksi " + cat;
            
            const list = document.getElementById('imageList');
            list.innerHTML = '';
            if(library[cat]) {
                library[cat].forEach(url => {
                    const itemWrapper = document.createElement('div');
                    itemWrapper.className = "gallery-item";
                    
                    const item = document.createElement('div');
                    item.className = "bg-white p-4 rounded-3xl shadow-md border-4 border-transparent hover:border-blue-400 cursor-pointer transition flex items-center justify-center h-full";
                    item.innerHTML = `<img src="${url}" class="w-full max-h-full object-contain pointer-events-none" onerror="this.src='https://placehold.co/150?text=Gambar'">`;
                    item.onclick = () => startColoring(url);
                    
                    itemWrapper.appendChild(item);
                    list.appendChild(itemWrapper);
                });
            }
            list.scrollLeft = 0;
        }

        function goHome() {
            document.getElementById('pageGallery').classList.add('hidden');
            document.getElementById('pageHome').classList.remove('hidden');
        }

        function backToGallery() {
            document.getElementById('pageEditor').classList.add('hidden');
            document.getElementById('pageGallery').classList.remove('hidden');
        }

        let imgWidth = 0, imgHeight = 0;

        function startColoring(url) {
            currentImgUrl = url;
            document.getElementById('pageGallery').classList.add('hidden');
            document.getElementById('pageEditor').classList.remove('hidden');
            
            const img = new Image();
            img.src = url;
            img.onload = () => {
                const frame = document.getElementById('canvasFrame');
                canvas.width = frame.clientWidth;
                canvas.height = frame.clientHeight;
                
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const ratio = Math.min((canvas.width - 160) / img.width, (canvas.height - 40) / img.height);
                imgWidth = img.width * ratio;
                imgHeight = img.height * ratio;
                ctx.drawImage(img, (canvas.width - imgWidth) / 2, (canvas.height - imgHeight) / 2, imgWidth, imgHeight);
                
                originalOutlineCanvas = document.createElement('canvas');
                originalOutlineCanvas.width = canvas.width;
                originalOutlineCanvas.height = canvas.height;
                originalOutlineCanvas.getContext('2d').drawImage(canvas, 0, 0);

                undoStack = [];
                saveState(); 
                zoomFit();
            };
        }

        function applyTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        function zoomIn() { scale = Math.min(scale + 0.25, 4.0); applyTransform(); }
        function zoomOut() { scale = Math.max(scale - 0.25, 0.6); applyTransform(); }
        function zoomFit() { scale = 1; panX = 0; panY = 0; applyTransform(); }

        const frame = document.getElementById('canvasFrame');
        frame.addEventListener('pointerdown', (e) => {
            evCache.push(e);
            if (evCache.length === 2) {
                isDragging = true;
                const p1 = evCache[0]; const p2 = evCache[1];
                startPanX = ((p1.clientX + p2.clientX) / 2) - panX;
                startPanY = ((p1.clientY + p2.clientY) / 2) - panY;
                prevDiff = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                baseScale = scale;
            }
        });

        frame.addEventListener('pointermove', (e) => {
            const index = evCache.findIndex((ev) => ev.pointerId === e.pointerId);
            if (index > -1) evCache[index] = e;

            if (evCache.length === 2) {
                isDragging = true;
                const p1 = evCache[0]; const p2 = evCache[1];
                panX = ((p1.clientX + p2.clientX) / 2) - startPanX;
                panY = ((p1.clientY + p2.clientY) / 2) - startPanY;

                const curDiff = Math.hypot(p1.clientX - p2.clientX, p1.clientY - p2.clientY);
                if (prevDiff > 0) {
                    scale = Math.min(Math.max(baseScale * (curDiff / prevDiff), 0.6), 4.0);
                }
                applyTransform();
            }
        });

        const handlePointerUp = (e) => {
            const index = evCache.findIndex((ev) => ev.pointerId === e.pointerId);
            if (index > -1) evCache.splice(index, 1);
            if (evCache.length < 2) { prevDiff = -1; setTimeout(() => isDragging = false, 50); }
        };
        frame.addEventListener('pointerup', handlePointerUp);
        frame.addEventListener('pointercancel', handlePointerUp);

        canvas.addEventListener('click', (e) => {
            if (isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));
            floodFillPattern(x, y, selectedColor);
            saveState();
        });

        function floodFillPattern(startX, startY, colorHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const oCtx = originalOutlineCanvas.getContext('2d');
            const originalData = oCtx.getImageData(0, 0, canvas.width, canvas.height);
            const targetColor = getPixelColor(imageData, startX, startY);
            
            const originalColorAtStart = getPixelColor(originalData, startX, startY);
            if (originalColorAtStart.r < 65 && originalColorAtStart.g < 65 && originalColorAtStart.b < 65) return;

            texturePatternCanvas = createCrayonTexture(colorHex);
            const patternData = texturePatternCanvas.getContext('2d').getImageData(0, 0, 64, 64);
            const pixelsToCheck = [startX, startY];
            const filledPixels = [];
            const visited = new Uint8Array(canvas.width * canvas.height);

            while (pixelsToCheck.length > 0) {
                const y = pixelsToCheck.pop(); const x = pixelsToCheck.pop();
                if (x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) continue;
                const idx = y * canvas.width + x;
                if (visited[idx]) continue;

                const currentColor = getPixelColor(imageData, x, y);
                const origColor = getPixelColor(originalData, x, y);

                if (colorsMatch(currentColor, targetColor) && !(origColor.r < 65 && origColor.g < 65 && origColor.b < 65)) {
                    visited[idx] = 1;
                    filledPixels.push({x, y});
                    pixelsToCheck.push(x + 1, y, x - 1, y, x, y + 1, x, y - 1);
                }
            }

            filledPixels.forEach(p => {
                const tx = ((p.x % 64) + 64) % 64; const ty = ((p.y % 64) + 64) % 64;
                const pIdx = (ty * 64 + tx) * 4;
                setPixelColor(imageData, p.x, p.y, { r: patternData.data[pIdx], g: patternData.data[pIdx+1], b: patternData.data[pIdx+2] });
            });

            ctx.putImageData(imageData, 0, 0);
        }

        function getPixelColor(imgData, x, y) {
            if (x < 0 || y < 0 || x >= imgData.width || y >= imgData.height) return {r:-1,g:-1,b:-1,a:-1};
            const i = (y * imgData.width + x) * 4;
            return { r: imgData.data[i], g: imgData.data[i+1], b: imgData.data[i+2], a: imgData.data[i+3] };
        }

        function setPixelColor(imgData, x, y, color) {
            const i = (y * imgData.width + x) * 4;
            imgData.data[i] = color.r; imgData.data[i+1] = color.g; imgData.data[i+2] = color.b; imgData.data[i+3] = 255;
        }

        function colorsMatch(c1, c2) {
            return Math.abs(c1.r - c2.r) < 60 && Math.abs(c1.g - c2.g) < 60 && Math.abs(c1.b - c2.b) < 60;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        function saveState() {
            if (undoStack.length >= 10) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        function undo() {
            if (undoStack.length > 1) { undoStack.pop(); ctx.putImageData(undoStack[undoStack.length - 1], 0, 0); }
        }

        function resetCanvas() { startColoring(currentImgUrl); }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'hasil-mewarnai.png';
            link.href = canvas.toDataURL('image/png');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        const paletteEl = document.getElementById('palette');
        colors.forEach((c, idx) => {
            const btn = document.createElement('div');
            btn.className = "marker" + (idx === 4 ? " active" : ""); 
            if(idx === 4) selectedColor = c;
            btn.style.backgroundColor = c;
            btn.style.setProperty('--marker-color', c); 
            btn.onclick = () => { selectedColor = c; highlightPalette(btn); };
            paletteEl.appendChild(btn);
        });

        function highlightPalette(activeBtn) {
            document.querySelectorAll('#palette .marker').forEach(b => b.classList.remove('active'));
            if(activeBtn) activeBtn.classList.add('active');
        }
    </script>
</body>
</html>
